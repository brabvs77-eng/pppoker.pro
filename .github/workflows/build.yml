name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix apps/web ci
          npx playwright install chromium

      - name: Rudiment audit
        run: npm run audit:rudiments

      - name: Production build
        run: npm run build

      - name: Homepage smoke (Playwright)
        run: npm run smoke:homepage

      - name: Landing page smoke (Playwright)
        run: npm run smoke:landing-pages

      - name: Blog page smoke (Playwright)
        run: npm run smoke:blog-pages
